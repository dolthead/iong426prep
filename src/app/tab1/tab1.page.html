<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Speech
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="share()">
        <ion-icon slot="icon-only" name="share-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button expand="block" fill="outline"
    color="success" (click)="record()"
    [disabled]="isListening()">
    <ion-icon slot="start" name="mic-circle-outline"></ion-icon>
    Record
  </ion-button>

  <ion-button expand="block" fill="outline"
    color="danger" (click)="stop()"
    [disabled]="!isListening()">
    <ion-icon slot="start" name="stop-circle-outline"></ion-icon>
    Stop
  </ion-button>

  <ion-textarea [(ngModel)]="recognizedText" label="Some text" labelPlacement="stacked"
    placeholder="Click the button, speak and pause"></ion-textarea>

  <ion-row>
    <ion-col size="6">
      <ion-input type="number"
        fill="solid"
        label="Pitch"
        labelPlacement="stacked"
        min="0.1"
        max="10"
        step="0.1"
        [(ngModel)]="pitch">
      </ion-input>
    </ion-col>
    <ion-col size="6">
      <ion-input type="number"
        fill="solid"
        label="Rate"
        labelPlacement="stacked"
        min="0.1"
        max="10"
        step="0.1"
        [(ngModel)]="rate">
      </ion-input>
    </ion-col>
  </ion-row>

  <ion-button expand="block" fill="outline"
    color="primary" (click)="speak()"
    [disabled]="!recognizedText">
    <ion-icon slot="start" name="volume-high-outline"></ion-icon>
    Say it (again)
  </ion-button>

</ion-content>
